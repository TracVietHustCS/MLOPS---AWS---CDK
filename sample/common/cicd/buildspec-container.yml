# =============================================================================
# CodeBuild Buildspec - Container Build
# =============================================================================
# Builds and pushes Docker container to ECR
# =============================================================================

version: 0.2

env:
  variables:
    DOCKER_BUILDKIT: "1"
  parameter-store:
    DOCKER_HUB_USER: "/acb/docker-hub/username"
    DOCKER_HUB_TOKEN: "/acb/docker-hub/token"

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - echo "Setting up build variables..."
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - REPOSITORY_URI=$ECR_REGISTRY/$ECR_REPOSITORY

  build:
    commands:
      - echo "Building Docker image..."
      - cd $CODEBUILD_SRC_DIR/container
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker tag $REPOSITORY_URI:$IMAGE_TAG $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "Writing image definitions file..."
      - printf '{"ImageURI":"%s"}' $REPOSITORY_URI:$IMAGE_TAG > imageDefinitions.json

artifacts:
  files:
    - imageDefinitions.json
  discard-paths: yes

cache:
  paths:
    - '/root/.cache/pip/**/*'
    - '/root/.docker/**/*'
